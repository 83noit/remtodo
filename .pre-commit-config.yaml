repos:
-   repo: local
    hooks:
    -   id: cargo-fmt
        name: cargo fmt
        entry: nix develop -c cargo fmt --check
        language: system
        pass_filenames: false
        types: [rust]
    -   id: cargo-clippy
        name: cargo clippy
        entry: nix develop -c cargo clippy -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]
    -   id: cargo-test
        name: cargo test
        entry: nix develop -c cargo test
        language: system
        pass_filenames: false
        types: [rust]
